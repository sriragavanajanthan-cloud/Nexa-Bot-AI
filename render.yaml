services:
  - type: web
    name: nexabot-video-api
    runtime: python
    repo: https://github.com/sriragavanajanthan-cloud/Nexa-Bot-AI
    plan: free
    region: oregon
    buildCommand: cd render-only && pip install -r requirements.txt
    startCommand: cd render-only && gunicorn server:app
    envVars:
      - key: PIXABAY_API_KEY
        value: 55575290-329752efa37512543a3df3950
